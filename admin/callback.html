<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Entrando… — Buba Beauty Studio</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;1,500&family=DM+Sans:wght@400;500&display=swap" />
  <link rel="stylesheet" href="assets/admin.css" />
</head>
<body class="callback-body">
  <main class="callback">
    <span class="callback__mark">Buba</span>
    <p class="callback__msg" id="callback-msg">Autenticando…</p>
    <p class="callback__err" id="callback-err" hidden></p>
    <a href="/" class="callback__link" id="callback-retry" hidden>Volver a intentarlo</a>
  </main>

  <script src="config.js"></script>
  <script>
    (async function () {
      const cfg = window.BUBA_ADMIN_CONFIG || {};
      const msg = document.getElementById("callback-msg");
      const errEl = document.getElementById("callback-err");
      const retry = document.getElementById("callback-retry");

      function fail(text) {
        msg.hidden = true;
        errEl.textContent = text;
        errEl.hidden = false;
        retry.hidden = false;
      }

      const params = new URLSearchParams(window.location.search);
      const code = params.get("code");
      const errParam = params.get("error");

      if (errParam) {
        fail("Cognito devolvió un error: " + errParam);
        return;
      }
      if (!code) {
        fail("Falta el parámetro 'code' en la URL.");
        return;
      }

      const verifier = sessionStorage.getItem("pkce_verifier");
      if (!verifier) {
        fail("No encontramos el verifier PKCE. Vuelve a iniciar sesión.");
        return;
      }

      try {
        const body = new URLSearchParams({
          grant_type: "authorization_code",
          client_id: cfg.cognitoClientId,
          code: code,
          redirect_uri: cfg.redirectUri,
          code_verifier: verifier
        });
        const res = await fetch(cfg.cognitoDomain.replace(/\/$/, "") + "/oauth2/token", {
          method: "POST",
          headers: { "Content-Type": "application/x-www-form-urlencoded" },
          body: body.toString()
        });
        if (!res.ok) {
          const text = await res.text();
          throw new Error("HTTP " + res.status + " " + text);
        }
        const tokens = await res.json();
        if (!tokens.id_token) throw new Error("Respuesta sin id_token.");

        sessionStorage.setItem("id_token", tokens.id_token);
        if (tokens.access_token) sessionStorage.setItem("access_token", tokens.access_token);
        if (tokens.refresh_token) sessionStorage.setItem("refresh_token", tokens.refresh_token);
        if (tokens.expires_in) {
          sessionStorage.setItem("id_token_expires_at", String(Date.now() + tokens.expires_in * 1000));
        }
        sessionStorage.removeItem("pkce_verifier");

        window.location.replace("/");
      } catch (e) {
        fail("No pudimos completar el login. " + (e && e.message ? e.message : ""));
      }
    })();
  </script>
</body>
</html>
